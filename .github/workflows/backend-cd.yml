name: Backend CD - Staging

on:
  push:
    branches: ["main", "build/cd"]   # Only deploy from main branch

permissions:
  contents: read
  packages: write   # Needed to push Docker image to GHCR

jobs:
  # ---------- CD: Deploy to Staging ----------
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # # 2. Log in to GitHub Container Registry (Optional)
      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # # 3. Build & tag Docker image (Optional)
      # - name: Build & Push Docker Image
      #   run: |
      #     IMAGE_NAME=ghcr.io/naychimin/fairshare_backend:staging
      #     echo "Building $IMAGE_NAME"
      #     docker build -t $IMAGE_NAME ./backend
      #     docker push $IMAGE_NAME

      # 4. Deploy to Railway using official action
      - name: Deploy to Railway Staging
        uses: railwayapp/deploy-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: FairShare_Backend
          project: Fairshare_Backend