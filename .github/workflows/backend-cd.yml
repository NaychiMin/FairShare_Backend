name: Backend CD - Staging

on:
  push:
    branches: ["main", "build/cd"]   # Only deploy from main branch

permissions:
  contents: read
  packages: write   # Needed to push Docker image to GHCR

jobs:
  # ---------- CD: Deploy to Staging ----------
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build & tag Docker image
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:staging ./backend
          docker push ghcr.io/${{ github.repository }}/backend:staging

      # 4. Install Railway CLI
      - name: Install Railway CLI
        run: curl -sL https://railway.app/install.sh | sh

      # 5. Deploy to Railway staging
      - name: Deploy to Railway Staging
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
          # DB_URL: ${{ secrets.DB_URL }}
        run: |
          railway login --ci
          railway up --service backend --image ghcr.io/${{ github.repository }}/backend:staging