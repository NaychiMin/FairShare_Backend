name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build and test backend
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw clean verify

    - name: Upload Test Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-reports
        path: backend/target/surefire-reports/

  trivy-scan:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t fairshare-backend ./backend

    - name: Cache Trivy DB
      uses: actions/cache@v4
      with:
        path: ~/.cache/trivy
        key: ${{ runner.os }}-trivy-db
        restore-keys: |
          ${{ runner.os }}-trivy-db

    - name: Download Trivy HTML template
      run: wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

    - name: Run Trivy Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: fairshare-backend
        format: template
        template: "@html.tpl"
        output: trivy-report.html
        severity: LOW,MEDIUM,HIGH,CRITICAL

    - name: Upload Trivy Report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-container-report
        path: trivy-report.html

  zap-scan:
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build backend
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    - name: Start backend
      run: |
        cd backend
        nohup java -jar target/*.jar &
        sleep 30

    - name: Run OWASP ZAP Full Scan Action
      uses: zaproxy/action-full-scan@v0.13.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: "http://host.docker.internal:8080"
        rules_file_name: ".zap/rules.tsv"   # optional: custom rules
        cmd_options: "-I -d"                 # -I = ignore failures, -d = debug logs
        fail_action: false                 # avoids failing workflow on alerts

    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: zap_reports/zap_report.html