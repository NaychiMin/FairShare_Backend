name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Build and test backend
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw clean verify

    - name: Build Docker Image
      run: docker build -t fairshare-backend ./backend
